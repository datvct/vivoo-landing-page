# ==========================================
# HTTP → HTTPS redirect
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name vivooeye.com www.vivooeye.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# HTTPS — Main domain
# ==========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vivooeye.com www.vivooeye.com;

    # ---- SSL Certificates (Let's Encrypt) ----
    ssl_certificate     /etc/letsencrypt/live/vivooeye.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vivooeye.com/privkey.pem;

    # ---- SSL hardening ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- Logging ----
    access_log /var/log/nginx/vivooeye.access.log main;
    error_log  /var/log/nginx/vivooeye.error.log warn;

    # ---- Static assets — long cache ----
    location /_next/static/ {
        proxy_pass http://vivoo-frontend:3000/_next/static/;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # ---- Public files ----
    location /public/ {
        proxy_pass http://vivoo-frontend:3000/public/;
        add_header Cache-Control "public, max-age=86400";
        proxy_set_header Host $host;
    }

    # ---- Favicon / robots / sitemap ----
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml)$ {
        proxy_pass http://vivoo-frontend:3000;
        add_header Cache-Control "public, max-age=86400";
        proxy_set_header Host $host;
    }

    # ---- API proxy (rate limited) ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://vivoo-frontend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---- Next.js app (general) ----
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://vivoo-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
